<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; background: #FAFAFA; color: #333;
}
.header {
  background: linear-gradient(135deg, #FF6B81, #FF9A9E);
  color: #fff; padding: 14px 16px; text-align: center;
}
.header h3 { font-size: 16px; margin-bottom: 2px; }
.header p { font-size: 11px; opacity: 0.85; }
.section { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
.section:last-child { border-bottom: none; }
.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0;
}
.row label { font-size: 13px; }
/* Toggle switch */
.switch { position: relative; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: #ccc; border-radius: 11px; cursor: pointer; transition: 0.3s;
}
.slider::before {
  content: ''; position: absolute; height: 16px; width: 16px;
  left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s;
}
input:checked + .slider { background: #FF6B81; }
input:checked + .slider::before { transform: translateX(18px); }
/* Buttons */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  flex: 1; min-width: 60px; padding: 8px 12px; border: 1px solid #e0e0e0;
  border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px;
  text-align: center; transition: all 0.2s;
}
.btn:hover { background: #f5f5f5; border-color: #FF6B81; }
.btn-primary {
  background: linear-gradient(135deg, #FF6B81, #FF9A9E);
  color: #fff; border: none;
}
.btn-primary:hover { opacity: 0.9; }
/* Skin list */
.skin-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.skin-item {
  padding: 5px 12px; border: 2px solid #eee; border-radius: 8px;
  cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.skin-item:hover { border-color: #FFB6C1; }
.skin-item.active { border-color: #FF6B81; background: #FFE8E8; color: #FF6B81; font-weight: 600; }
/* Quick reminder */
.reminder-input {
  display: flex; gap: 6px; margin-top: 8px;
}
.reminder-input input {
  flex: 1; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 8px;
  font-size: 12px; outline: none;
}
.reminder-input input:focus { border-color: #FF6B81; }
.footer {
  text-align: center; padding: 10px; font-size: 11px; color: #999;
}
</style>
</head>
<body>

<div class="header">
  <h3>🐱 桌面宠物</h3>
  <p>陪伴你的每一次浏览</p>
</div>

<div class="section">
  <div class="row">
    <label>启用宠物</label>
    <label class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <label>边缘吸附</label>
    <label class="switch">
      <input type="checkbox" id="edge-snap" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <label>闲置小动作</label>
    <label class="switch">
      <input type="checkbox" id="idle-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <label>整点报时</label>
    <label class="switch">
      <input type="checkbox" id="hourly" checked>
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="section">
  <label style="font-size:12px;color:#999;">🎨 切换皮肤</label>
  <div class="skin-list" id="skin-list"></div>
</div>

<div class="section">
  <label style="font-size:12px;color:#999;">⏰ 计时提醒</label>
  <div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">
    <input type="text" id="reminder-text" placeholder="提醒内容（如：喝水、开会、休息）" style="padding:6px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;outline:none">
    <div style="font-size:12px;color:#666">快速倒计时</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn timer-btn" data-min="5" style="padding:6px 10px;font-size:12px;flex:1;min-width:50px">5分钟</button>
      <button class="btn timer-btn" data-min="10" style="padding:6px 10px;font-size:12px;flex:1;min-width:50px">10分钟</button>
      <button class="btn timer-btn" data-min="15" style="padding:6px 10px;font-size:12px;flex:1;min-width:50px">15分钟</button>
      <button class="btn timer-btn" data-min="30" style="padding:6px 10px;font-size:12px;flex:1;min-width:50px">30分钟</button>
      <button class="btn timer-btn" data-min="60" style="padding:6px 10px;font-size:12px;flex:1;min-width:50px">1小时</button>
      <button class="btn timer-btn" data-min="120" style="padding:6px 10px;font-size:12px;flex:1;min-width:50px">2小时</button>
    </div>
    <div style="font-size:12px;color:#666">或指定时间</div>
    <div style="display:flex;gap:6px;align-items:center">
      <input type="time" id="reminder-time" style="flex:1;padding:5px 8px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;outline:none">
      <button class="btn btn-primary" id="add-alarm" style="min-width:auto;padding:6px 12px">设闹钟</button>
    </div>
  </div>
</div>

<div class="section">
  <div class="btn-row">
    <button class="btn" id="hide-btn">👁️ 隐藏</button>
    <button class="btn" id="reset-btn">📍 重置</button>
    <button class="btn" id="settings-btn">⚙️ 设置</button>
  </div>
</div>

<div class="footer">v1.0 · 右键宠物呼出菜单</div>

<script src="popup.js"></script>
</body>
</html>
