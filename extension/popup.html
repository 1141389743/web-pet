<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 260px; font-family: -apple-system, sans-serif; font-size: 13px; padding: 16px; }
h3 { font-size: 15px; margin-bottom: 12px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.toggle-btn {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, #FF6B81, #FF9A9E); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px;
}
.toggle-btn:hover { opacity: 0.9; }
.btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px; }
.btn:hover { background: #f5f5f5; }
.actions { display: flex; gap: 6px; margin-top: 10px; }
</style>
</head>
<body>
<h3>🐱 桌面宠物</h3>
<div class="row"><span>显示宠物</span><input type="checkbox" id="enabled" checked></div>
<div class="row"><span>整点报时</span><input type="checkbox" id="hourly" checked></div>
<div class="actions">
  <button class="btn" id="hide-btn">隐藏</button>
  <button class="btn" id="reset-btn">重置位置</button>
</div>
<button class="toggle-btn" id="settings-btn">打开设置</button>
<script src="popup.js"></script>
</body>
</html>
